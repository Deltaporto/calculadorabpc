<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1520" role="graphics-document document" aria-roledescription="flowchart" font-family="'DM Sans','Segoe UI',system-ui,Arial,sans-serif">
  <title>Fluxograma de Controle Judicial BPC</title>
  <desc>Fluxo de triagem probatória para decidir dispensa ou necessidade de avaliação social judicial no BPC.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,3.5 L0,7z" fill="#64748b"/></marker>
    <marker id="ag" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,3.5 L0,7z" fill="#16a34a"/></marker>
    <marker id="ar" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,3.5 L0,7z" fill="#dc2626"/></marker>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity=".16"/></filter>
    <filter id="sg"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#16a34a" flood-opacity=".2"/></filter>
    <filter id="sr"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#dc2626" flood-opacity=".2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1520" rx="16" fill="#f8fafc"/>

  <!-- ═══════ INÍCIO ═══════ -->
  <g transform="translate(500,32)">
    <circle r="22" fill="#e0e7ff" stroke="#6366f1" stroke-width="2.5"/>
    <text text-anchor="middle" dy=".35em" font-size="10.5" font-weight="700" fill="#312e81">INÍCIO</text>
  </g>
  <line x1="500" y1="54" x2="500" y2="72" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════ ① BASE ADMINISTRATIVA ═══════ -->
  <g transform="translate(500,80)" filter="url(#s)">
    <rect x="-220" y="0" width="440" height="72" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8"/>
    <text text-anchor="middle" y="19" font-size="12.5" font-weight="700" fill="#1e3a5f">① BASE ADMINISTRATIVA</text>
    <text text-anchor="middle" y="36" font-size="10" fill="#334155">Inserir qualificadores: Amb · Ativ · Corpo</text>
    <text text-anchor="middle" y="50" font-size="9" fill="#475569">Escala: N · L · M · G · C | Reconhecimentos INSS: Estruturas / Prognóstico</text>
  </g>
  <line x1="500" y1="152" x2="500" y2="172" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════ IMPEDIMENTO LP? ═══════ -->
  <g transform="translate(500,230)">
    <polygon points="0,-52 90,0 0,52 -90,0" fill="#fef9c3" stroke="#d97706" stroke-width="1.8" filter="url(#s)"/>
    <text text-anchor="middle" dy="-10" font-size="10" font-weight="600" fill="#78350f">Perícia reconhece</text>
    <text text-anchor="middle" dy="5" font-size="10" font-weight="600" fill="#78350f">Impedimento de</text>
    <text text-anchor="middle" dy="20" font-size="10" font-weight="600" fill="#78350f">Longo Prazo?</text>
  </g>
  <!-- NÃO → DISPENSA M1 -->
  <path d="M410,230 L115,230 L115,1342" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <rect x="340" y="218" width="40" height="16" rx="4" fill="#fff"/><text x="360" y="230" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">NÃO</text>
  <!-- SIM → ② PERÍCIA -->
  <line x1="500" y1="282" x2="500" y2="304" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="484" y="285" width="26" height="14" rx="3" fill="#fff"/><text x="497" y="295" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748b">SIM</text>

  <!-- ═══════ ② PERÍCIA MÉDICA ═══════ -->
  <g transform="translate(500,310)" filter="url(#s)">
    <rect x="-110" y="0" width="220" height="32" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.8"/>
    <text text-anchor="middle" y="20" font-size="11.5" font-weight="700" fill="#0f172a">② PERÍCIA MÉDICA</text>
  </g>
  <line x1="500" y1="342" x2="500" y2="362" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════ ALTERA CORPO? ═══════ -->
  <g transform="translate(500,425)">
    <polygon points="0,-58 108,0 0,58 -108,0" fill="#fef9c3" stroke="#d97706" stroke-width="1.8" filter="url(#s)"/>
    <text text-anchor="middle" dy="-16" font-size="9.5" font-weight="600" fill="#78350f">Perícia traz novos</text>
    <text text-anchor="middle" dy="-2" font-size="9.5" font-weight="600" fill="#78350f">elementos sobre</text>
    <text text-anchor="middle" dy="12" font-size="9.5" font-weight="600" fill="#78350f">Funções do Corpo</text>
    <text text-anchor="middle" dy="26" font-size="9.5" font-weight="600" fill="#78350f">vs. avaliação adm.?</text>
  </g>
  <!-- NÃO – Manter (left) -->
  <line x1="392" y1="425" x2="280" y2="425" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="310" y="413" width="70" height="16" rx="3" fill="#fff"/><text x="345" y="425" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748b">NÃO – Manter</text>
  <g transform="translate(195,425)" filter="url(#s)">
    <rect x="-76" y="-20" width="152" height="40" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
    <text text-anchor="middle" dy="-3" font-size="9.5" fill="#1e3a5f">Corpo Judicial</text>
    <text text-anchor="middle" dy="11" font-size="9.5" fill="#1e3a5f">= Corpo Administrativo</text>
  </g>
  <path d="M195,445 L195,556 L498,556" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <!-- SIM – Alterar (right) -->
  <line x1="608" y1="425" x2="720" y2="425" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="630" y="413" width="68" height="16" rx="3" fill="#fff"/><text x="664" y="425" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748b">SIM – Alterar</text>
  <g transform="translate(860,425)" filter="url(#s)">
    <rect x="-126" y="-40" width="252" height="80" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
    <text text-anchor="middle" dy="-24" font-size="9.5" font-weight="600" fill="#1e3a5f">Motivo da alteração:</text>
    <text text-anchor="middle" dy="-10" font-size="8.5" fill="#334155">· Estruturas não reconhecidas → +1 grau</text>
    <text text-anchor="middle" dy="3" font-size="8.5" fill="#334155">· Prognóstico não reconhecido → +1 grau</text>
    <text text-anchor="middle" dy="16" font-size="8.5" fill="#334155">· Domínio b1-b8 mais grave → máx domínios</text>
    <text text-anchor="middle" dy="29" font-size="8.5" fill="#334155">· Rebaixamento → qualificador manual</text>
  </g>
  <path d="M860,465 L860,556 L502,556" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <!-- Merge -->
  <circle cx="500" cy="556" r="3.5" fill="#64748b"/>
  <line x1="500" y1="560" x2="500" y2="578" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════ CORPO N/L? ═══════ -->
  <g transform="translate(500,630)">
    <polygon points="0,-46 72,0 0,46 -72,0" fill="#fef9c3" stroke="#d97706" stroke-width="1.8" filter="url(#s)"/>
    <text text-anchor="middle" dy="-6" font-size="10" font-weight="600" fill="#78350f">Corpo Judicial</text>
    <text text-anchor="middle" dy="10" font-size="10" font-weight="600" fill="#78350f">= N ou L?</text>
  </g>
  <!-- SIM → DISPENSA M2 -->
  <path d="M428,630 L285,630 L285,1342" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <rect x="350" y="618" width="26" height="16" rx="3" fill="#fff"/><text x="363" y="630" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">SIM</text>
  <!-- NÃO → REQUALIF -->
  <line x1="500" y1="676" x2="500" y2="700" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="484" y="680" width="26" height="14" rx="3" fill="#fff"/><text x="497" y="690" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748b">NÃO</text>

  <!-- ═══════ REQUALIFICAR ATIV? ═══════ -->
  <g transform="translate(500,770)">
    <polygon points="0,-58 108,0 0,58 -108,0" fill="#fef9c3" stroke="#d97706" stroke-width="1.8" filter="url(#s)"/>
    <text text-anchor="middle" dy="-10" font-size="9.5" font-weight="600" fill="#78350f">Perícia trouxe</text>
    <text text-anchor="middle" dy="4" font-size="9.5" font-weight="600" fill="#78350f">elementos para</text>
    <text text-anchor="middle" dy="18" font-size="9.5" font-weight="600" fill="#78350f">requalificar Atividades?</text>
  </g>
  <!-- NÃO (left) → Ativ = Admin -->
  <line x1="392" y1="770" x2="280" y2="770" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="310" y="758" width="40" height="16" rx="3" fill="#fff"/><text x="330" y="770" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b">NÃO</text>
  <g transform="translate(195,770)" filter="url(#s)">
    <rect x="-76" y="-20" width="152" height="40" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
    <text text-anchor="middle" dy="-3" font-size="9.5" fill="#1e3a5f">Atividades Judicial</text>
    <text text-anchor="middle" dy="11" font-size="9.5" fill="#1e3a5f">= Ativ. Administrativas</text>
  </g>
  <path d="M195,790 L195,868 L498,868" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <!-- SIM (right) → Modo -->
  <line x1="608" y1="770" x2="720" y2="770" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="632" y="758" width="26" height="16" rx="3" fill="#fff"/><text x="645" y="770" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b">SIM</text>
  <g transform="translate(860,770)" filter="url(#s)">
    <rect x="-110" y="-28" width="220" height="56" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4"/>
    <text text-anchor="middle" dy="-10" font-size="9.5" font-weight="600" fill="#1e3a5f">Modo de requalificação:</text>
    <text text-anchor="middle" dy="5" font-size="8.5" fill="#334155">· Simples: qualificador + justificativa</text>
    <text text-anchor="middle" dy="18" font-size="8.5" fill="#334155">· Completo: domínios d1-d9</text>
  </g>
  <path d="M860,798 L860,868 L502,868" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <!-- Merge 2 -->
  <circle cx="500" cy="868" r="3.5" fill="#64748b"/>
  <line x1="500" y1="872" x2="500" y2="890" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════ ③ TRIAGEM PROBATÓRIA ═══════ -->
  <g transform="translate(500,896)" filter="url(#s)">
    <rect x="-130" y="0" width="260" height="40" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1.8"/>
    <text text-anchor="middle" y="16" font-size="11.5" font-weight="700" fill="#0f172a">③ TRIAGEM PROBATÓRIA</text>
    <text text-anchor="middle" y="32" font-size="8.5" fill="#475569">Processamento automático</text>
  </g>
  <line x1="500" y1="936" x2="500" y2="960" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════ TESTE A ═══════ -->
  <g transform="translate(500,1030)">
    <polygon points="0,-64 110,0 0,64 -110,0" fill="#fef9c3" stroke="#d97706" stroke-width="1.8" filter="url(#s)"/>
    <text text-anchor="middle" dy="-22" font-size="10.5" font-weight="700" fill="#78350f">TESTE A</text>
    <text text-anchor="middle" dy="-6" font-size="8.5" fill="#78350f">Amb Adm. + Ativ Adm.</text>
    <text text-anchor="middle" dy="7" font-size="8.5" fill="#78350f">+ Corpo Judicial</text>
    <text text-anchor="middle" dy="20" font-size="8.5" fill="#78350f">→ Tabela Conclusiva</text>
    <text text-anchor="middle" dy="34" font-size="9" font-weight="600" fill="#78350f">Resultado POSITIVO?</text>
  </g>
  <!-- SIM → DISPENSA M3 (from left of diamond) -->
  <path d="M390,1030 L455,1030 L455,1342" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <rect x="414" y="1018" width="26" height="16" rx="3" fill="#fff"/><text x="427" y="1030" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">SIM</text>
  <!-- NÃO → VERIFICAR SE HÁ ATIVIDADES MÉDICAS -->
  <line x1="500" y1="1094" x2="500" y2="1114" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="484" y="1098" width="26" height="14" rx="3" fill="#fff"/><text x="497" y="1108" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748b">NÃO</text>

  <!-- HÁ REQUALIFICAÇÃO MÉDICA DE ATIVIDADES? -->
  <g transform="translate(500,1158)">
    <polygon points="0,-44 78,0 0,44 -78,0" fill="#fef9c3" stroke="#d97706" stroke-width="1.8" filter="url(#s)"/>
    <text text-anchor="middle" dy="-9" font-size="8.8" font-weight="600" fill="#78350f">Há reclassificação</text>
    <text text-anchor="middle" dy="5" font-size="8.8" font-weight="600" fill="#78350f">médica de Atividades</text>
    <text text-anchor="middle" dy="19" font-size="8.8" font-weight="600" fill="#78350f">para testar?</text>
  </g>
  <!-- NÃO -> ASN -->
  <path d="M578,1158 L760,1250" fill="none" stroke="#dc2626" stroke-width="1.6" marker-end="url(#ar)"/>
  <rect x="644" y="1190" width="26" height="16" rx="3" fill="#fff"/><text x="657" y="1202" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">NÃO</text>
  <!-- SIM -> TESTE B -->
  <line x1="500" y1="1202" x2="500" y2="1226" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="484" y="1208" width="26" height="14" rx="3" fill="#fff"/><text x="497" y="1218" text-anchor="middle" font-size="8.5" font-weight="700" fill="#64748b">SIM</text>

  <!-- ═══════ TESTE B ═══════ -->
  <g transform="translate(500,1290)">
    <polygon points="0,-64 110,0 0,64 -110,0" fill="#fef9c3" stroke="#d97706" stroke-width="1.8" filter="url(#s)"/>
    <text text-anchor="middle" dy="-22" font-size="10.5" font-weight="700" fill="#78350f">TESTE B</text>
    <text text-anchor="middle" dy="-6" font-size="8.5" fill="#78350f">Amb Adm. + Ativ Médica</text>
    <text text-anchor="middle" dy="7" font-size="8.5" fill="#78350f">+ Corpo Judicial</text>
    <text text-anchor="middle" dy="20" font-size="8.5" fill="#78350f">→ Tabela Conclusiva</text>
    <text text-anchor="middle" dy="34" font-size="9" font-weight="600" fill="#78350f">Resultado POSITIVO?</text>
  </g>
  <!-- SIM → DISPENSA M4 (from right of diamond, routing to M4 position) -->
  <path d="M610,1290 L625,1290 L625,1342" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ag)"/>
  <rect x="610" y="1274" width="26" height="16" rx="3" fill="#fff"/><text x="623" y="1286" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">SIM</text>
  <!-- NÃO → ASN (right) -->
  <line x1="610" y1="1315" x2="760" y2="1360" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
  <rect x="664" y="1331" width="26" height="16" rx="3" fill="#fff"/><text x="677" y="1343" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">NÃO</text>

  <!-- ═══════ AVALIAÇÃO SOCIAL NECESSÁRIA ═══════ -->
  <g transform="translate(860,1370)" filter="url(#sr)">
    <rect x="-100" y="-30" width="200" height="60" rx="30" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
    <text text-anchor="middle" dy="-6" font-size="10" font-weight="700" fill="#7f1d1d">AVALIAÇÃO SOCIAL</text>
    <text text-anchor="middle" dy="10" font-size="10" font-weight="700" fill="#7f1d1d">NECESSÁRIA</text>
  </g>
  <!-- ASN → merge line down to TEXTO -->
  <path d="M860,1400 L860,1410 L502,1410" fill="none" stroke="#64748b" stroke-width="1.2"/>

  <!-- ═══════ DISPENSA RESULTS ROW ═══════ -->
  <g transform="translate(115,1370)" filter="url(#sg)">
    <rect x="-76" y="-24" width="152" height="48" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text text-anchor="middle" dy="-4" font-size="9" font-weight="700" fill="#14532d">DISPENSA — M1</text>
    <text text-anchor="middle" dy="10" font-size="7.5" fill="#166534">Sem Impedimento LP</text>
  </g>
  <g transform="translate(285,1370)" filter="url(#sg)">
    <rect x="-76" y="-24" width="152" height="48" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text text-anchor="middle" dy="-4" font-size="9" font-weight="700" fill="#14532d">DISPENSA — M2</text>
    <text text-anchor="middle" dy="10" font-size="7.5" fill="#166534">Corpo N/L insuficiente</text>
  </g>
  <g transform="translate(455,1370)" filter="url(#sg)">
    <rect x="-76" y="-24" width="152" height="48" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text text-anchor="middle" dy="-4" font-size="9" font-weight="700" fill="#14532d">DISPENSA — M3</text>
    <text text-anchor="middle" dy="10" font-size="7.5" fill="#166534">Deferido por prova médica</text>
  </g>
  <g transform="translate(625,1370)" filter="url(#sg)">
    <rect x="-76" y="-24" width="152" height="48" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text text-anchor="middle" dy="-4" font-size="9" font-weight="700" fill="#14532d">DISPENSA — M4</text>
    <text text-anchor="middle" dy="10" font-size="7.5" fill="#166534">Deferido c/ reclass. Ativ.</text>
  </g>
  <!-- Connect all results down -->
  <line x1="115" y1="1394" x2="115" y2="1410" stroke="#64748b" stroke-width="1"/>
  <line x1="285" y1="1394" x2="285" y2="1410" stroke="#64748b" stroke-width="1"/>
  <line x1="455" y1="1394" x2="455" y2="1410" stroke="#64748b" stroke-width="1"/>
  <line x1="625" y1="1394" x2="625" y2="1410" stroke="#64748b" stroke-width="1"/>
  <!-- Horizontal merge -->
  <line x1="115" y1="1410" x2="860" y2="1410" stroke="#64748b" stroke-width="1"/>
  <line x1="500" y1="1410" x2="500" y2="1434" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════ ④ TEXTO DA DECISÃO ═══════ -->
  <g transform="translate(500,1440)" filter="url(#s)">
    <rect x="-160" y="0" width="320" height="30" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text text-anchor="middle" y="19" font-size="10" font-weight="600" fill="#334155">④ TEXTO DA DECISÃO — Gerado automaticamente</text>
  </g>

  <!-- ═══════ LEGEND ═══════ -->
  <g transform="translate(500,1492)">
    <line x1="-120" y1="0" x2="-90" y2="0" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="-83" y="4" font-size="8" fill="#475569">Dispensa avaliação social</text>
    <line x1="50" y1="0" x2="80" y2="0" stroke="#dc2626" stroke-width="1.8"/>
    <text x="87" y="4" font-size="8" fill="#475569">Avaliação social necessária</text>
    <line x1="-120" y1="14" x2="-90" y2="14" stroke="#64748b" stroke-width="1.5"/>
    <text x="-83" y="18" font-size="8" fill="#475569">Fluxo principal</text>
  </g>
</svg>
